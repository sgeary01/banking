version: "3.9"

# Monitoring stack — completely separate from the banking app.
#
# Network topology:
#   banking   (external) — shared with the app so Prometheus/Promtail can
#                          reach services for scraping and log collection
#   monitoring (internal) — private network for Grafana ↔ Prometheus ↔ Loki
#                           traffic; monitoring tools never appear on the
#                           banking network as service peers
#
# Promtail discovers containers via the Docker socket but is filtered to
# only collect logs from containers labelled with the 'banking' compose
# project — monitoring tool logs never enter Loki.
#
# Start:  make monitoring-up
# Stop:   make monitoring-down

services:
  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: banking-prometheus
    restart: unless-stopped
    networks:
      - banking     # reach banking services for scraping
      - monitoring  # reach Grafana (for datasource proxy)
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  # ── Loki ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: banking-loki
    restart: unless-stopped
    networks:
      - monitoring  # only needs to talk to Grafana and Promtail
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  # ── Promtail ──────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    container_name: banking-promtail
    restart: unless-stopped
    networks:
      - monitoring  # push logs to Loki
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: banking-grafana
    restart: unless-stopped
    networks:
      - monitoring  # talk to Prometheus and Loki
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Prevent Grafana from appearing in Prometheus self-scrape
      GF_METRICS_ENABLED: "false"
    depends_on:
      - prometheus
      - loki

networks:
  banking:
    external: true   # must exist — created by 'make up'
  monitoring:
    name: monitoring
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

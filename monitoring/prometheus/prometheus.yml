global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ['api-gateway:8000']
  - job_name: auth-service
    static_configs:
      - targets: ['auth-service:8001']
  - job_name: customer-service
    static_configs:
      - targets: ['customer-service:8002']
  - job_name: account-service
    static_configs:
      - targets: ['account-service:8003']
  - job_name: transaction-service
    static_configs:
      - targets: ['transaction-service:8004']
  - job_name: ledger-service
    static_configs:
      - targets: ['ledger-service:8005']
  - job_name: fraud-service
    static_configs:
      - targets: ['fraud-service:8006']
  - job_name: notification-service
    static_configs:
      - targets: ['notification-service:8007']
  - job_name: reporting-service
    static_configs:
      - targets: ['reporting-service:8008']
  - job_name: chaos-service
    static_configs:
      - targets: ['chaos-service:8009']

ingest:
  tokenSecretName: resolve-ingest-token
  host: receiver.dev0.resolve.ai

clusterName: banking
environment: smg-production

# Pin all integration config to this file. Disables Resolve SaaS UI-side
# overrides for this satellite — anything you add or change in the Resolve UI
# is ignored. Keeps the cluster reproducible across bootstraps with zero
# manual UI cleanup. Manage integrations only here.
configOverride: false

integrations:
  grafana:
    type: grafana
    create: true
    secretName: resolve-grafana
    connection:
      url: http://grafana.monitoring.svc.cluster.local:3000
      alertScrapingEnabled: true
  alertmanager:
    type: alertManager
    create: true
    connection:
      url: http://alertmanager.monitoring.svc.cluster.local:9093
  elasticsearch:
    type: elasticsearch
    create: true
    connection:
      url: http://elasticsearch.monitoring.svc.cluster.local:9200
      # no auth — xpack security disabled on this cluster
  loki:
    type: loki
    create: true
    connection:
      url: http://loki.monitoring.svc.cluster.local:3100
  prometheus:
    type: prometheus
    create: true
    connection:
      url: http://prometheus.monitoring.svc.cluster.local:9090
  tempo:
    type: tempo
    create: true
    connection:
      url: http://tempo.monitoring.svc.cluster.local:3200

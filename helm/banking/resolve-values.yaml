ingest:
  tokenSecretName: resolve-ingest-token
  host: receiver.dev0.resolve.ai

clusterName: banking
environment: smg-production

# NOTE: configOverride is left at the chart default (true) on purpose.
# We tried configOverride: false to pin everything to this file, but the
# satellite's Grafana integration would not authenticate via the K8s
# secret-mounted token in that mode — it appears to require a SaaS-side
# config push to learn its Grafana credentials. So: SaaS overrides apply.
# After each fresh bootstrap, paste the freshly-minted Grafana SA token
# (from `kubectl get secret resolve-grafana -o jsonpath='{.data.apiToken}'
# | base64 -d`) into the Resolve UI's Grafana integration ONE time.

integrations:
  grafana:
    type: grafana
    create: true
    secretName: resolve-grafana
    connection:
      url: http://grafana.monitoring.svc.cluster.local:3000
      alertScrapingEnabled: true
  alertmanager:
    type: alertManager
    create: true
    connection:
      url: http://alertmanager.monitoring.svc.cluster.local:9093
  elasticsearch:
    type: elasticsearch
    create: true
    connection:
      url: http://elasticsearch.monitoring.svc.cluster.local:9200
      # no auth — xpack security disabled on this cluster
  loki:
    type: loki
    create: true
    connection:
      url: http://loki.monitoring.svc.cluster.local:3100
  prometheus:
    type: prometheus
    create: true
    connection:
      url: http://prometheus.monitoring.svc.cluster.local:9090
  tempo:
    type: tempo
    create: true
    connection:
      url: http://tempo.monitoring.svc.cluster.local:3200

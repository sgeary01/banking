apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: alertmanager
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/webhookUrl

    templates:
      - /etc/alertmanager/templates/*.tmpl

    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: 'slack-warning'

      routes:
        - matchers:
            - severity = critical
          group_wait: 10s
          receiver: 'slack-critical'

        - matchers:
            - alertname = SuspiciousClaimsSpike
          group_by: ['alertname']
          receiver: 'slack-warning'

    receivers:
      - name: 'slack-critical'
        slack_configs:
          - channel: '#atlas-app-alerts'
            send_resolved: true
            icon_emoji: ':red_circle:'
            username: 'Alertmanager'
            title: '{{ "{{" }} template "slack.title" . {{ "}}" }}'
            text: '{{ "{{" }} template "slack.text" . {{ "}}" }}'
        # Microsoft Teams (via msteams-relay) + ServiceNow incident creation.
        # These run alongside Slack — one alert fans out to all three.
        webhook_configs:
          - url: 'http://msteams-relay.monitoring.svc.cluster.local:8080/alerts'
            send_resolved: true
          - url: 'http://servicenow-mock.monitoring.svc.cluster.local:8080/api/now/webhook'
            send_resolved: true

      - name: 'slack-warning'
        slack_configs:
          - channel: '#atlas-app-alerts'
            send_resolved: true
            icon_emoji: ':warning:'
            username: 'Alertmanager'
            title: '{{ "{{" }} template "slack.title" . {{ "}}" }}'
            text: '{{ "{{" }} template "slack.text" . {{ "}}" }}'
        webhook_configs:
          - url: 'http://msteams-relay.monitoring.svc.cluster.local:8080/alerts'
            send_resolved: true
          - url: 'http://servicenow-mock.monitoring.svc.cluster.local:8080/api/now/webhook'
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - alertname = ServiceDown
        target_matchers:
          - alertname =~ "HighErrorRate|HighLatency"
        equal: ['job']

  slack.tmpl: |
    {{ "{{" }} define "slack.title" {{ "}}" }}
    {{ "{{" }} if eq .Status "firing" {{ "}}" }}{{ "{{" }} if eq (index .Alerts 0).Labels.severity "critical" {{ "}}" }}:red_circle:{{ "{{" }} else {{ "}}" }}:warning:{{ "{{" }} end {{ "}}" }} [{{ "{{" }} .Status | toUpper {{ "}}" }}] {{ "{{" }} (index .Alerts 0).Labels.alertname {{ "}}" }}{{ "{{" }} else {{ "}}" }}:white_check_mark: [RESOLVED] {{ "{{" }} (index .Alerts 0).Labels.alertname {{ "}}" }}{{ "{{" }} end {{ "}}" }}
    {{ "{{" }} end {{ "}}" }}

    {{ "{{" }} define "slack.text" {{ "}}" }}
    {{ "{{" }} range .Alerts {{ "}}" }}*Service:* {{ "{{" }} .Labels.job {{ "}}" }}
    *Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
    *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
    *Severity:* {{ "{{" }} .Labels.severity {{ "}}" }}
    {{ "{{" }} end {{ "}}" }}
    {{ "{{" }} end {{ "}}" }}

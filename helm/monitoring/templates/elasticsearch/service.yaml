{{- if .Values.elastic.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: monitoring
  labels:
    app: elasticsearch
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  selector:
    app: elasticsearch
  ports:
    - port: 9200
      targetPort: 9200
{{- end }}

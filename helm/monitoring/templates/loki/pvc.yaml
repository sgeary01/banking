{{- if .Values.loki.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: monitoring
  labels:
    app: loki
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.loki.storage.size }}
  {{- if .Values.loki.storage.storageClass }}
  storageClassName: {{ .Values.loki.storage.storageClass }}
  {{- end }}
{{- end }}

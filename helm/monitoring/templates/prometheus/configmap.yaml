apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager.monitoring.svc.cluster.local:9093']

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: api-gateway
        static_configs:
          - targets: ['api-gateway.{{ .Values.bankingNamespace }}.svc.cluster.local:8000']
      - job_name: auth-service
        static_configs:
          - targets: ['auth-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8001']
      - job_name: customer-service
        static_configs:
          - targets: ['customer-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8002']
      - job_name: account-service
        static_configs:
          - targets: ['account-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8003']
      - job_name: transaction-service
        static_configs:
          - targets: ['transaction-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8004']
      - job_name: ledger-service
        static_configs:
          - targets: ['ledger-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8005']
      - job_name: fraud-service
        static_configs:
          - targets: ['fraud-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8006']
      - job_name: notification-service
        static_configs:
          - targets: ['notification-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8007']
      - job_name: reporting-service
        static_configs:
          - targets: ['reporting-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8008']
      - job_name: chaos-service
        static_configs:
          - targets: ['chaos-service.{{ .Values.bankingNamespace }}.svc.cluster.local:8009']

      - job_name: kube-state-metrics
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

      - job_name: node-exporter
        static_configs:
          - targets: ['node-exporter.monitoring.svc.cluster.local:9100']

      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          - source_labels: [container]
            regex: ''
            action: drop
          - source_labels: [__name__]
            regex: 'container_(cpu_cfs_periods_total|cpu_cfs_throttled_periods_total|cpu_usage_seconds_total|memory_working_set_bytes|memory_limit_bytes|memory_rss)'
            action: keep

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  # Dashboard provider — tells Grafana to load JSON files from this directory
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Atlas Financial
        folder: Atlas Financial
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards

  banking-overview.json: |
{{ .Files.Get "dashboards/banking-overview.json" | indent 4 }}
  transactions.json: |
{{ .Files.Get "dashboards/transactions.json" | indent 4 }}
  fraud-risk.json: |
{{ .Files.Get "dashboards/fraud-risk.json" | indent 4 }}
  service-health.json: |
{{ .Files.Get "dashboards/service-health.json" | indent 4 }}
  logs-explorer.json: |
{{ .Files.Get "dashboards/logs-explorer.json" | indent 4 }}
  traces.json: |
{{ .Files.Get "dashboards/traces.json" | indent 4 }}
  k8s-pod-health.json: |
{{ .Files.Get "dashboards/k8s-pod-health.json" | indent 4 }}

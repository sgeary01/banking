apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  # Dashboard provider — tells Grafana to load JSON files from this directory
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: Banking
        folder: Banking
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards

  # Banking Overview dashboard JSON
  banking-overview.json: |
{{ .Files.Get "dashboards/banking-overview.json" | indent 4 }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
  labels:
    app: promtail
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  promtail-config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: debug

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: banking-pods
        static_configs:
          - targets: [localhost]
            labels:
              namespace: {{ .Values.bankingNamespace }}
              __path__: /var/log/pods/{{ .Values.bankingNamespace }}_*/*/*.log

        pipeline_stages:
          # Path format: /var/log/pods/{ns}_{pod}_{uid}/{container}/{n}.log
          # The container directory name equals the app/service name in this setup.
          - regex:
              expression: '/var/log/pods/[^/]+/(?P<service>[^/]+)/'
              source: filename
          - labels:
              service:

          # Unwrap CRI log format used by k3s/containerd:
          # <timestamp> <stream> <flags> <actual log content>
          - cri: {}

          # Extract labels from structlog JSON for backend services (skip frontend nginx logs)
          # Keep the full JSON as the log line so LogQL | json works downstream
          - match:
              selector: '{namespace="{{ .Values.bankingNamespace }}", service!~"frontend.*"}'
              stages:
                - json:
                    expressions:
                      level: level
                - labels:
                    level:

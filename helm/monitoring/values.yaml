# Namespace where banking app services live — used for Prometheus targets
# and Promtail namespace filter
bankingNamespace: banking

prometheus:
  image: prom/prometheus:v2.51.2
  retention: 7d
  storage:
    enabled: true
    size: 2Gi
    storageClass: ""   # "" = cluster default (local-path on OrbStack)

loki:
  image: grafana/loki:3.0.0
  storage:
    enabled: true
    size: 2Gi
    storageClass: ""

promtail:
  image: grafana/promtail:3.0.0

tempo:
  image: grafana/tempo:2.4.1
  storage:
    enabled: true
    size: 2Gi
    storageClass: ""

kubeStateMetrics:
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.12.0

nodeExporter:
  image: prom/node-exporter:v1.8.0

alertmanager:
  image: prom/alertmanager:v0.27.0
  service:
    nodePort: 30093

grafana:
  image: grafana/grafana:10.4.2
  adminUser: admin
  adminPassword: admin
  storage:
    enabled: true
    size: 1Gi
    storageClass: ""
  service:
    type: NodePort
    nodePort: 30030

# ── Alert-routing integrations (Atlas Financial) ───────────────────
# Relay + mock services built from the banking shared base image, so their
# images come through the same build/import path as the banking services.
msteamsRelay:
  image: banking/msteams-relay:latest
  port: 8080
  service:
    nodePort: 30150

servicenowMock:
  image: banking/servicenow-mock:latest
  port: 8080
  service:
    nodePort: 30140

# ── Elastic log destination (Atlas Financial) ──────────────────────
# Single-node Elasticsearch + a Fluent Bit shipper + Kibana, mirroring
# the customer's Elastic stack. Promtail→Loki stays untouched.
# HEAVY: adds ~2-3 GB RAM. Bump Docker Desktop to ~12 GB before enabling.
elastic:
  enabled: true
  image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
  javaOpts: "-Xms512m -Xmx512m"
  storage:
    enabled: true
    size: 2Gi
    storageClass: ""
  fluentBit:
    image: cr.fluentbit.io/fluent/fluent-bit:3.0.4
  kibana:
    enabled: true
    image: docker.elastic.co/kibana/kibana:8.13.4
    service:
      nodePort: 30560

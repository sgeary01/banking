{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "satellite.fullname" .) .Values.serviceAccount.name }}
  labels:
    {{- include "satellite.labels" . | nindent 4 }}
  annotations:
    {{- include "satellite.annotations" . | nindent 4 }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}

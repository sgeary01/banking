{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "satellite.fullname" . }}-viewer
  labels:
    {{- include "satellite.labels" . | nindent 4 }}
  annotations:
    {{- include "satellite.annotations" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "satellite.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ default (include "satellite.fullname" .) .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
{{- end }}
